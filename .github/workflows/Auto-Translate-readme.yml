name: Update README & Auto-Translate

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

env:
  BRANCH_PREFIX: update/readme-
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:

# ==================== 1. TRANSLATE ====================
  translate:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        include:
          - language: "russian"
            code: "ru"
            file: "README.ru.md"
          - language: "english"
            code: "en"
            file: "README.en.md"
          - language: "french"
            code: "fr"
            file: "README.fr.md"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: compiled-readme
          path: .

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai tiktoken

      - name: Translate README
        id: translate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, re
          from openai import OpenAI
          import tiktoken

          client = OpenAI(
              base_url="https://models.inference.ai.azure.com/",
              api_key=os.environ["GITHUB_TOKEN"]
          )

          enc = tiktoken.encoding_for_model("gpt-4o")

          def tokens(t): 
              return len(enc.encode(t))

          def translate(text, lang):
              return client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{
                      "role": "user",
                      "content": f"Translate to {lang}. Keep code, links, paths unchanged:\n\n{text}"
                  }],
                  temperature=0.3
              ).choices[0].message.content

          with open("README.md","r",encoding="utf-8") as f:
              text = f.read()

          parts = re.split(r'\n\n+', text)

          MAX = 5500
          chunks, cur, size = [], [], 0

          for p in parts:
              t = tokens(p) + 50
              if size + t > MAX and cur:
                  chunks.append(translate("\n\n".join(cur), "${{ matrix.language }}"))
                  cur = [p]
                  size = t
              else:
                  cur.append(p)
                  size += t

          if cur:
              chunks.append(translate("\n\n".join(cur), "${{ matrix.language }}"))

          result = "\n\n".join(chunks)

          # FIX LINKS (важно для твоего images/LanguageReadme кейса)
          result = result.replace('](/', '](<../')
          result = result.replace('(./', '(<../')

          out_file = f"LanguageReadme/${{ matrix.file }}"
          os.makedirs("LanguageReadme", exist_ok=True)

          with open(out_file, "w", encoding="utf-8") as f:
              f.write(result)
          EOF

      - name: Upload translation
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.file }}
          path: LanguageReadme/${{ matrix.file }}


#      - name: Save translation
#        run: |
#          mkdir -p LanguageReadme
#
#          printf "%s" "${{ steps.translate.outputs.translated }}" \
#          | sed -E '
#              s|\]\(\./|\](<../|g;
#              s|\(<\./|\(<../|g;
#            ' \
#          > "LanguageReadme/${{ matrix.file }}"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.file }}
          path: LanguageReadme/${{ matrix.file }}



          

# ==================== 2. LANGUAGE INDEX ====================
  generate-language-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create index
        run: |
          mkdir -p .github/README_PARTS

          cat << 'EOF' > .github/README_PARTS/0.Language.md
          <p align="center">
            <strong>-------></strong>
            <a href="/LanguageReadme/README.md">中文</a> |
            <a href="/LanguageReadme/README.ru.md">Russian</a> |
            <a href="/LanguageReadme/README.en.md">English</a> |
            <a href="/LanguageReadme/README.fr.md">Français</a>
            <strong><-------</strong>
          </p>

          <br/>

          ---
          
          <br/>
          EOF

      - uses: actions/upload-artifact@v5
        with:
          name: language-index
          path: .github/README_PARTS/0.Language.md


# ==================== 3. BUILD README ====================
  compile-readme:
    needs: [translate, generate-language-index]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Build README
        run: |
          mkdir -p LanguageReadme .github/README_PARTS

          cat artifacts/0.Language.md > README.md
          echo "" >> README.md

          # если позже добавишь основной контент — сюда вставишь
          cat README.md >> README.md


# ==================== 4. PR ====================
  create-pr:
    needs: compile-readme
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore files
        run: |
          mkdir -p LanguageReadme .github/README_PARTS

          cp artifacts/README.ru.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.en.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.fr.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/0.Language.md .github/README_PARTS/0.Language.md 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update README translations"
          title: "chore: update README translations"
          body: |
            Translation updates:
            - Russian
            - English
            - French
          branch: ${{ env.BRANCH_PREFIX }}${{ github.run_id }}
          base: main
          delete-branch: true
          labels: automated, documentation, translation
          add-paths: |
            README.md
            LanguageReadme/
            .github/README_PARTS/