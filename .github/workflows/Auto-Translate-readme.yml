name: Update README & Auto-Translate

on:
  workflow_dispatch:
#  push:
#    branches: [ main ]
#    paths:
#      - ".github/README_PARTS/**"
#      - "README.md"

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_PREFIX: update/readme-

jobs:
  # ==================== СБОРКА ОСНОВНОГО README ====================
  compile-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build README.md from parts
        run: |
          PARTS=".github/README_PARTS"
          OUTPUT="README.md"

          # Если у тебя есть система с частями — оставь. Если нет — можно упростить.
          if [ -d "$PARTS" ]; then
            cat "$PARTS"/0.Language.md > "$OUTPUT" 2>/dev/null || true
            echo -e "\n\n" >> "$OUTPUT"
            cat "$PARTS"/1.HEADER.md >> "$OUTPUT" 2>/dev/null || true
            # ... добавь остальные части по необходимости
          else
            echo "Нет папки README_PARTS, используем существующий README.md"
          fi

      - name: Upload compiled README
        uses: actions/upload-artifact@v4
        with:
          name: compiled-readme
          path: README.md

  # ==================== ПЕРЕВОДЫ ====================
  translate:
    needs: compile-readme
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: "russian"
            code: "ru"
            file: "README.ru.md"
          - language: "english"
            code: "en"
            file: "README.en.md"
          - language: "french"
            code: "fr"
            file: "README.fr.md"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: compiled-readme
          path: .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai tiktoken

      - name: Translate to ${{ matrix.language }}
        id: translate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, openai, tiktoken, re

          client = openai.OpenAI(
              base_url="https://models.inference.ai.azure.com/",
              api_key=os.environ["GITHUB_TOKEN"]
          )
          encoding = tiktoken.encoding_for_model("gpt-4o")

          def count_tokens(text):
              return len(encoding.encode(text))

          def translate_chunk(chunk, target):
              prompt = f"""Технические термины (UE5, Metahuman, Fay, Unreal Engine, GitHub и т.д.) оставляй на английском.
          Не переводи блоки кода, ссылки и пути.

          Переведи следующий текст на {target}:

          {chunk}"""
              resp = client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0.3
              )
              return resp.choices[0].message.content

          with open("README.md", "r", encoding="utf-8") as f:
              text = f.read()

          # Разбиваем на чанки
          paragraphs = re.split(r'\n\n+', text)
          chunks, current, tokens = [], [], 0
          MAX_TOKENS = 5500

          for p in paragraphs:
              p_tokens = count_tokens(p) + 50
              if tokens + p_tokens > MAX_TOKENS and current:
                  chunks.append(translate_chunk("\n\n".join(current), "${{ matrix.language }}"))
                  current, tokens = [p], p_tokens
              else:
                  current.append(p)
                  tokens += p_tokens

          if current:
              chunks.append(translate_chunk("\n\n".join(current), "${{ matrix.language }}"))

          translated = "\n\n".join(chunks)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              print("translated-text<<EOF", file=out)
              print(translated, file=out)
              print("EOF", file=out)
          EOF

      - name: Save translation
        run: |
          mkdir -p LanguageReadme
          cat > "LanguageReadme/${{ matrix.file }}" <<'EOT'
          ${{ steps.translate.outputs.translated-text }}
          EOT

      - name: Upload translation
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          path: LanguageReadme/${{ matrix.file }}

  # ==================== ОБНОВЛЕНИЕ ИНДЕКСА ЯЗЫКОВ ====================
  generate-language-index:
    needs: translate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Language Index
        run: |
          mkdir -p .github/README_PARTS
          cat > .github/README_PARTS/0.Language.md << 'EOF'
          <p align="center">
            <strong>-------></strong>
            <a href="/README.md">中文</a> |
            <a href="/README.ru.md">Русский</a> |
            <a href="/README.en.md">English</a> |
            <a href="/README.fr.md">Français</a>
            <strong><-------</strong>
          </p>
          EOF

      - name: Upload Language Index
        uses: actions/upload-artifact@v4
        with:
          name: language-index
          path: .github/README_PARTS/0.Language.md

  # ==================== СОЗДАНИЕ PULL REQUEST ====================
  create-pr:
    needs: [compile-readme, translate, generate-language-index]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore files
        run: |
          mkdir -p LanguageReadme .github/README_PARTS
          cp artifacts/README.md ./README.md 2>/dev/null || true
          cp artifacts/README.*.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/0.Language.md .github/README_PARTS/ 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update README translations (auto)"
          title: "chore: update README translations (auto)"
          body: |
            Автоматическое обновление переводов:
            - Русский
            - English
            - Français

            Run: ${{ github.run_id }}
          branch: ${{ env.BRANCH_PREFIX }}translations-${{ github.run_id }}
          base: main
          delete-branch: true
          labels: automated, documentation, translation
          add-paths: |
            README.md
            README.*.md
            LanguageReadme/
            .github/README_PARTS/0.Language.md