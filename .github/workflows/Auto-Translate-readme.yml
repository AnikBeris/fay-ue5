name: Update README & Auto-Translate

on:
  workflow_dispatch:
#  push:
#    branches: [ main ]
#    paths:
#      - ".github/README_PARTS/**"
#      - "README.md"

permissions:
  contents: write
  pull-requests: write
  models: read

env:
  BRANCH_PREFIX: update/readme-
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==================== 1. LANGUAGE INDEX ====================
  generate-language-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create Language Index
        run: |
          mkdir -p .github/README_PARTS
          cat > .github/README_PARTS/0.Language.md << 'EOF'
          <p align="center">
            <strong>-------></strong>
            <a href="/LanguageReadme/README.md">中文</a> |
            <a href="/LanguageReadme/README.ru.md">Russian</a> |
            <a href="/LanguageReadme/README.en.md">English</a> |
            <a href="/LanguageReadme/README.fr.md">Français</a>
            <strong><-------</strong>
          </p>
          EOF

      - name: Upload Language Index
        uses: actions/upload-artifact@v5
        with:
          name: language-index
          path: .github/README_PARTS/0.Language.md

  # ==================== 2. BUILD MAIN README ====================
  compile-readme:
    needs: generate-language-index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: language-index
          path: .github/README_PARTS/

      - name: Build README.md from parts
        run: |
          PARTS=".github/README_PARTS"
          OUTPUT="README.md"
          TEMP_README="temp_README.md"

          # Check if original README exists
          if [ ! -f "README.md" ]; then
            echo "ERROR: README.md not found in repository root"
            exit 1
          fi

          # Save original README to temp file
          cp README.md "$TEMP_README"

          # Build new README with language index
          if [ -d "$PARTS" ] && [ -f "$PARTS/0.Language.md" ]; then
            cat "$PARTS/0.Language.md" > "$OUTPUT"
            echo -e "\n\n" >> "$OUTPUT"
            cat "$TEMP_README" >> "$OUTPUT"
            echo "README.md built successfully"
          else
            echo "WARNING: 0.Language.md not found, keeping original README.md"
            cp "$TEMP_README" "$OUTPUT"
          fi

      - name: Upload compiled README
        uses: actions/upload-artifact@v5
        with:
          name: compiled-readme
          path: README.md

  # ==================== 3. TRANSLATIONS ====================
  translate:
    needs: compile-readme
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: "russian"
            code: "ru"
            file: "README.ru.md"
          - language: "english"
            code: "en"
            file: "README.en.md"
          - language: "french"
            code: "fr"
            file: "README.fr.md"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: compiled-readme
          path: .

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install openai tiktoken

      - name: Translate to ${{ matrix.language }}
        id: translate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, openai, tiktoken, re

          client = openai.OpenAI(
              base_url="https://models.inference.ai.azure.com/",
              api_key=os.environ["GITHUB_TOKEN"]
          )
          encoding = tiktoken.encoding_for_model("gpt-4o")

          def count_tokens(text):
              return len(encoding.encode(text))

          def translate_chunk(chunk, target):
              prompt = f"""You are a professional technical translator.

              Translation rules:
              1. Technical terms (UE5, Metahuman, Fay, Unreal Engine, GitHub, AI, etc.) MUST remain in English
              2. Do NOT translate content inside code blocks (between ```)
              3. Do NOT translate links (URLs) and file paths (./images/...)
              4. Do NOT translate names, emails
              5. Preserve ALL Markdown formatting (headers, lists, bold, italic, etc.)
              6. Preserve ALL emojis and special characters
              7. Translate ONLY the natural language text

              Translate the following text to {target} EXACTLY, keeping ALL structure and formatting:

              {chunk}"""
              
              response = client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0.3
              )
              return response.choices[0].message.content

          # Read the compiled README
          with open("README.md", "r", encoding="utf-8") as f:
              text = f.read()

          # Split into paragraphs
          paragraphs = re.split(r'\n\n+', text)
          chunks, current, tokens = [], [], 0
          MAX_TOKENS = 5000

          for para in paragraphs:
              p_tokens = count_tokens(para) + 50
              if tokens + p_tokens > MAX_TOKENS and current:
                  try:
                      translated_chunk = translate_chunk("\n\n".join(current), "${{ matrix.language }}")
                      # Fix links in translated chunk
                      translated_chunk = translated_chunk.replace('](/', '](<../')
                      translated_chunk = translated_chunk.replace('(./', '(<../')
                      chunks.append(translated_chunk)
                  except Exception as e:
                      print(f"Translation error: {e}")
                      chunks.append("\n\n".join(current))
                  current, tokens = [para], p_tokens
              else:
                  current.append(para)
                  tokens += p_tokens

          if current:
              try:
                  translated_chunk = translate_chunk("\n\n".join(current), "${{ matrix.language }}")
                  # Fix links in translated chunk
                  translated_chunk = translated_chunk.replace('](/', '](<../')
                  translated_chunk = translated_chunk.replace('(./', '(<../')
                  chunks.append(translated_chunk)
              except Exception as e:
                  print(f"Translation error: {e}")
                  chunks.append("\n\n".join(current))

          translated = "\n\n".join(chunks)

          # Save to file
          with open("translated_temp.md", "w", encoding="utf-8") as f:
              f.write(translated)

          # Read for GitHub output
          with open("translated_temp.md", "r", encoding="utf-8") as f:
              translated_content = f.read()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              print("translated-text<<EOF", file=out)
              print(translated_content, file=out)
              print("EOF", file=out)
          EOF

      - name: Save translation
        run: |
          mkdir -p LanguageReadme
          
          # Save translation
          printf '%s' "${{ steps.translate.outputs.translated-text }}" > "LanguageReadme/${{ matrix.file }}"
          
          # Verify file was created and not empty
          if [ -f "LanguageReadme/${{ matrix.file }}" ] && [ -s "LanguageReadme/${{ matrix.file }}" ]; then
            echo "Successfully saved translation to LanguageReadme/${{ matrix.file }}"
            echo "File size: $(wc -c < LanguageReadme/${{ matrix.file }}) bytes"
          else
            echo "ERROR: Failed to save translation to LanguageReadme/${{ matrix.file }}"
            exit 1
          fi

      - name: Upload translation
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.file }}
          path: LanguageReadme/${{ matrix.file }}

  # ==================== 4. FINAL BUILD ====================
  final-build:
    needs: [compile-readme, translate, generate-language-index]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore files
        run: |
          mkdir -p LanguageReadme .github/README_PARTS

          # Restore main README
          if [ -f artifacts/README.md ]; then
            cp artifacts/README.md ./README.md
            echo "Restored README.md"
          else
            echo "WARNING: README.md not found in artifacts"
          fi

          # Restore translations
          for file in README.ru.md README.en.md README.fr.md; do
            if [ -f "artifacts/$file" ]; then
              cp "artifacts/$file" LanguageReadme/
              echo "Restored $file"
            else
              echo "WARNING: $file not found in artifacts"
            fi
          done

          # Restore language index
          if [ -f artifacts/0.Language.md ]; then
            cp artifacts/0.Language.md .github/README_PARTS/
            echo "Restored 0.Language.md"
          else
            echo "WARNING: 0.Language.md not found in artifacts"
          fi

      - name: Upload final files
        uses: actions/upload-artifact@v5
        with:
          name: final-output
          path: |
            README.md
            LanguageReadme/
            .github/README_PARTS/

  # ==================== 5. CREATE PULL REQUEST ====================
  create-pr:
    needs: final-build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: final-output
          path: .

      - name: Verify files before PR
        run: |
          echo "Files to be committed:"
          echo "README.md: $(wc -l < README.md) lines"
          
          for file in LanguageReadme/*.md; do
            if [ -f "$file" ]; then
              echo "$file: $(wc -l < $file) lines"
            fi
          done
          
          # Check if translations have content
          for file in LanguageReadme/README.en.md LanguageReadme/README.ru.md LanguageReadme/README.fr.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -lt 50 ]; then
                echo "WARNING: $file has only $lines lines - translation may be incomplete"
              fi
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update README translations"
          title: "chore: update README translations"
          body: |
            Translation updates:
            - Russian
            - English
            - Français

            .
            ├── README.md
            ├── LanguageReadme/
            │   ├── README.ru.md
            │   ├── README.en.md
            │   └── README.fr.md
            └── .github/
            │   └── README_PARTS/
            │       └── 0.Language.md



            Run: ${{ github.run_id }}
          branch: ${{ env.BRANCH_PREFIX }}translations-${{ github.run_id }}
          base: main
          delete-branch: true
          labels: automated, documentation, translation
          add-paths: |
            README.md
            LanguageReadme/
            .github/README_PARTS/