name: Update README & Auto-Translate

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

env:
  BRANCH_PREFIX: update/readme-
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ==================== 1. TRANSLATE ====================
  translate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: "russian"
            file: "README.ru.md"
          - language: "english"
            file: "README.en.md"
          - language: "french"
            file: "README.fr.md"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai tiktoken

      - name: Translate
        id: translate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, openai, tiktoken, re

          client = openai.OpenAI(
              base_url="https://models.inference.ai.azure.com/",
              api_key=os.environ["GITHUB_TOKEN"]
          )

          encoding = tiktoken.encoding_for_model("gpt-4o")

          def count_tokens(t): return len(encoding.encode(t))

          def translate(text, lang):
              return client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{"role":"user","content":f"Translate to {lang}:\n\n{text}"}],
                  temperature=0.3
              ).choices[0].message.content

          with open("README.md","r",encoding="utf-8") as f:
              text = f.read()

          paragraphs = re.split(r'\n\n+', text)

          chunks, cur, tok = [], [], 0
          MAX = 5500

          for p in paragraphs:
              t = count_tokens(p) + 50
              if tok + t > MAX and cur:
                  chunks.append(translate("\n\n".join(cur), "${{ matrix.language }}"))
                  cur, tok = [p], t
              else:
                  cur.append(p)
                  tok += t

          if cur:
              chunks.append(translate("\n\n".join(cur), "${{ matrix.language }}"))

          result = "\n\n".join(chunks)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("translated<<EOF\n")
              f.write(result)
              f.write("\nEOF\n")
          EOF

      - name: Save translation
        run: |
          mkdir -p LanguageReadme

          echo "${{ steps.translate.outputs.translated }}" \
            | sed -E '
                s|\]\(\./|\](<../|g;
                s|\(<\./|\(<../|g;
              ' \
            > "LanguageReadme/${{ matrix.file }}"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.file }}
          path: LanguageReadme/${{ matrix.file }}

  # ==================== 2. LANGUAGE INDEX ====================
  generate-language-index:
    needs: translate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create Language Index
        run: |
          mkdir -p .github/README_PARTS

          cat << 'EOF' > LanguageReadme/file.md
          <p align="center">
            <strong>-------></strong>
            <a href="/LanguageReadme/README.md">中文</a> |
            <a href="/LanguageReadme/README.ru.md">Russian</a> |
            <a href="/LanguageReadme/README.en.md">English</a> |
            <a href="/LanguageReadme/README.fr.md">Français</a>
            <strong><-------</strong>
          </p>

          <br/>
          
          ---
          
          <br/>

          EOF

      - uses: actions/upload-artifact@v5
        with:
          name: language-index
          path: .github/README_PARTS/0.Language.md

  # ==================== 3. BUILD FINAL README ====================
  compile-readme:
    needs: generate-language-index
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Build final README.md
        run: |
          mkdir -p LanguageReadme .github/README_PARTS

          cp artifacts/README.ru.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.en.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.fr.md LanguageReadme/ 2>/dev/null || true

          cat artifacts/0.Language.md > README.md
          echo "" >> README.md
          cat README.md >> README.md.tmp 2>/dev/null || true
          mv README.md.tmp README.md

      - uses: actions/upload-artifact@v5
        with:
          name: compiled-readme
          path: README.md

  # ==================== 4. PR ====================
  create-pr:
    needs: [compile-readme, translate, generate-language-index]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore
        run: |
          mkdir -p LanguageReadme .github/README_PARTS

          cp artifacts/README.md README.md 2>/dev/null || true

          cp artifacts/README.ru.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.en.md LanguageReadme/ 2>/dev/null || true
          cp artifacts/README.fr.md LanguageReadme/ 2>/dev/null || true

          cp artifacts/0.Language.md .github/README_PARTS/0.Language.md 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update README translations"
          title: "chore: update README translations"
          body: |
            Translation updates:
            - Russian
            - English
            - Français

            Run: ${{ github.run_id }}
          branch: ${{ env.BRANCH_PREFIX }}${{ github.run_id }}
          base: main
          delete-branch: true
          labels: automated, documentation, translation
          add-paths: |
            README.md
            LanguageReadme/
            .github/README_PARTS/